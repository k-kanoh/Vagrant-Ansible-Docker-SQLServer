- name: vagrant provisioning
  hosts: all # all / localhost
  become: yes
  vars:
    users:
      - root
      - kkano
  tasks:
    - name: SELinuxを無効化
      selinux:
        state: disabled

    - name: timezoneを設定
      timezone:
        name: Asia/Tokyo

    - name: ユーザを追加
      user:
        uid: 9066
        name: kkano
        shell: /bin/bash

    - name: 公開鍵の登録
      authorized_key:
        user: kkano
        key: "ssh-rsa "

    - name: .bashrc編集
      lineinfile:
        dest: "~{{item}}/.bashrc"
        regexp: "^alias rm='rm -i'$"
        state: absent
      with_items: "{{users}}"

    - name: .bashrc編集
      lineinfile:
        dest: "~{{item}}/.bashrc"
        regexp: "^alias cp='cp -i'$"
        state: absent
      with_items: "{{users}}"

    - name: .bashrc編集
      lineinfile:
        dest: "~{{item}}/.bashrc"
        regexp: "^alias mv='mv -i'$"
        state: absent
      with_items: "{{users}}"

    - name: .bashrc追記
      blockinfile:
        path:
          "~{{item}}/.bashrc"
        block: |
          alias ls='ls -A --color=auto'
          alias histruncate='history -c;history -w'
          alias psx='ps x'
          alias sudo='sudo -i'
          export LSCOLORS=gxfxcxdxbxegedabagacad
          export PATH=$PATH:/usr/local/bin
        marker:
          "# {mark} Insert by init-playbook.yml"
      with_items:
        "{{users}}"

    - name: ユーザをsudoersに登録
      copy:
        content: "kkano ALL=(ALL) NOPASSWD: ALL"
        dest: /etc/sudoers.d/kkano
        mode: 0440

    - name: sendmailを削除
      yum:
        name: sendmail
        state: absent
      ignore_errors: yes

    - name: yum update
      yum:
        name: "*"
        state: latest

    - name: 必要そうなパッケージのインストール
      yum:
        name:
          - git
          - curl
        state:
          present
